# =============================================
# ERG-INVENTORY - CONFIGURACIÓN GENERAL
# =============================================

spring.application.name=ERG-INVENTORY
server.port=${PORT:8080}

# Importar variables desde el archivo .env (ignorado en Git)
spring.config.import=optional:file:.env[.properties]

# Origenes permitidos para CORS (frontend local, Vercel o dominio propio)
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:http://localhost:*,https://*.vercel.app}


# =============================================
# BASE DE DATOS - SUPABASE POSTGRESQL
# =============================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# HIKARI CONNECTION POOL (Optimizado Supabase)
# =============================================

spring.datasource.hikari.pool-name=ERG-HikariPool
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# =============================================
# HIBERNATE / JPA
# =============================================

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# =============================================
# LOGGING
# =============================================

logging.level.org.hibernate.SQL=OFF
logging.level.org.springframework=WARN
logging.level.com.ergpos=INFO

# =============================================
# JWT
# =============================================

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:28800000}

# =============================================
# GROQ AI — Asistente POS-AI
# =============================================

app.groq.api-key=${GROQ_API_KEY:}
app.groq.base-url=https://api.groq.com/openai/v1/chat/completions
app.groq.model=${GROQ_MODEL:llama-3.1-8b-instant}
app.groq.fallback-models=${GROQ_FALLBACK_MODELS:llama-3.3-70b-versatile,openai/gpt-oss-20b,openai/gpt-oss-120b}
app.groq.max-tokens=${GROQ_MAX_TOKENS:1024}
